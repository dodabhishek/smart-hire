# Infrastructure for smart-hire services.
# Run: docker compose up -d
services:
  postgres-job:
    image: postgres:16-alpine
    ports:
      - "5556:5432"
    environment:
      POSTGRES_DB: jobdb
      POSTGRES_USER: smarthire
      POSTGRES_PASSWORD: smarthire123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarthire -d jobdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-candidate:
    image: postgres:16-alpine
    ports:
      - "5555:5432"
    environment:
      POSTGRES_DB: candidatedb
      POSTGRES_USER: smarthire
      POSTGRES_PASSWORD: smarthire123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarthire -d candidatedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
